<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Calendar body -->
  <rect x="2" y="6" width="28" height="24" rx="3" ry="3" fill="#FF6B00" stroke="#CC4400" stroke-width="1.5"/>
  <!-- Calendar header -->
  <rect x="2" y="6" width="28" height="8" rx="3" ry="3" fill="#CC3300"/>
  <rect x="2" y="10" width="28" height="4" fill="#CC3300"/>
  <!-- Binding rings -->
  <rect x="9" y="3" width="3" height="7" rx="1.5" fill="#FFD700" stroke="#CC9900" stroke-width="1"/>
  <rect x="20" y="3" width="3" height="7" rx="1.5" fill="#FFD700" stroke="#CC9900" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="2" y1="20" x2="30" y2="20" stroke="#FF8C00" stroke-width="0.8"/>
  <line x1="2" y1="25" x2="30" y2="25" stroke="#FF8C00" stroke-width="0.8"/>
  <line x1="11" y1="14" x2="11" y2="30" stroke="#FF8C00" stroke-width="0.8"/>
  <line x1="20" y1="14" x2="20" y2="30" stroke="#FF8C00" stroke-width="0.8"/>
  <!-- Dragon Ball 4-star in center cell -->
  <circle cx="15.5" cy="22.5" r="4.2" fill="#FFD700" stroke="#CC9900" stroke-width="0.8"/>
  <!-- 4 red 5-point stars (absolute coords) -->
  <polygon points="13.5,19.9 13.82,20.85 14.82,20.85 14.0,21.45 14.32,22.4 13.5,21.8 12.68,22.4 13.0,21.45 12.18,20.85 13.18,20.85" fill="#CC3300"/>
  <polygon points="17.5,19.9 17.82,20.85 18.82,20.85 18.0,21.45 18.32,22.4 17.5,21.8 16.68,22.4 17.0,21.45 16.18,20.85 17.18,20.85" fill="#CC3300"/>
  <polygon points="13.5,22.9 13.82,23.85 14.82,23.85 14.0,24.45 14.32,25.4 13.5,24.8 12.68,25.4 13.0,24.45 12.18,23.85 13.18,23.85" fill="#CC3300"/>
  <polygon points="17.5,22.9 17.82,23.85 18.82,23.85 18.0,24.45 18.32,25.4 17.5,24.8 16.68,25.4 17.0,24.45 16.18,23.85 17.18,23.85" fill="#CC3300"/>
  <!-- Dots for other cells -->
  <circle cx="6" cy="17.5" r="1" fill="#FFD700"/>
  <circle cx="15.5" cy="17.5" r="1" fill="#FFD700"/>
  <circle cx="25" cy="17.5" r="1" fill="#FFD700"/>
  <circle cx="6" cy="22.5" r="1" fill="#FFD700"/>
  <circle cx="25" cy="22.5" r="1" fill="#FFD700"/>
  <circle cx="6" cy="27.5" r="1" fill="#FFD700"/>
  <circle cx="15.5" cy="27.5" r="1" fill="#FFD700"/>
  <circle cx="25" cy="27.5" r="1" fill="#FFD700"/>
</svg>
